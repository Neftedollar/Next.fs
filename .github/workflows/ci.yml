name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Run Node tests
        run: node --test tests/*.mjs

      - name: Restore local tools
        run: dotnet tool restore

      - name: Validate Femto metadata
        run: dotnet femto --validate src/NextFs/NextFs.fsproj

      - name: Build solution
        run: dotnet build NextFs.slnx -v minimal

      - name: Pack library
        run: dotnet pack src/NextFs/NextFs.fsproj -c Release -o artifacts

      - name: Generate sample Next.js entry wrappers
        run: node tools/nextfs-entry.mjs samples/nextfs.entries.json

      - name: Scan starter F# attributes into entries manifest
        run: node tools/nextfs-scan.mjs examples/nextfs-starter/src/NextFs.Starter.fsproj

      - name: Verify checked-in entries manifest is up to date
        run: git diff --exit-code -- examples/nextfs-starter/nextfs.entries.json

      - name: Generate starter example Next.js entry wrappers
        run: node tools/nextfs-entry.mjs examples/nextfs-starter/nextfs.entries.json

      - name: Install starter example dependencies
        working-directory: examples/nextfs-starter
        run: npm ci

      - name: Build starter example
        working-directory: examples/nextfs-starter
        run: npm run sync:app && npm run build

      - name: Verify checked-in starter wrappers are up to date
        run: git diff --exit-code -- examples/nextfs-starter/app examples/nextfs-starter/proxy.js examples/nextfs-starter/instrumentation.js examples/nextfs-starter/instrumentation-client.js

      - name: E2E smoke - start and check routes
        working-directory: examples/nextfs-starter
        run: |
          npx next start &
          SERVER_PID=$!
          for i in $(seq 1 10); do
            curl -sf http://localhost:3000/ && break
            sleep 1
          done
          curl -sf http://localhost:3000/ || (kill $SERVER_PID; exit 1)
          curl -sf http://localhost:3000/api/posts || (kill $SERVER_PID; exit 1)
          kill $SERVER_PID
