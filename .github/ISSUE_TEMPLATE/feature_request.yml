name: Feature request
description: Propose a new binding, API, or repository workflow improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the repository does this affect?
      options:
        - bindings
        - navigation
        - server
        - directives
        - tooling
        - samples
        - docs
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What is currently missing or painful?
      placeholder: There is no typed binding for metadata generation, so consumers need manual interop.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API or workflow you want to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds or competing designs, if any.

  - type: textarea
    id: scope
    attributes:
      label: Expected scope
      description: Keep this concrete. Mention whether it is additive, breaking, or experimental.
    validations:
      required: true
